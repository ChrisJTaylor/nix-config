name: update-flake-lock

on:
  workflow_dispatch:
    inputs:
      flakes-to-update:
        description: "Specific flake inputs to be updated (space-separated. Leave empty to update all flakes."
        required: false
        type: string
  schedule:
    - cron: "0 13 * * 6" # weekly on Saturday at 1pm

jobs:
  lockfile:
    permissions:
      contents: write
      pull-requests: write
    runs-on: [self-hosted, nix]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/update-flake-lock@main
        with:
          pr-title: "Update flake inputs"
          pr-labels: |
            dependencies
            automated
          inputs: ${{ github.event.inputs.flakes-to-update }}
